{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card-soft bg-white p-4">
      <h3 class="mb-3">Login</h3>
      <p class="text-muted small mb-4">Access your money manager workspace.</p>
      <form method="post">
        <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <div class="mb-3">
          <a href="{{ url_for('request_password_reset') }}" class="small">Forgot password?</a>
        </div>
        <div class="d-grid gap-2">
          <button class="btn btn-success">Login</button>
          <a href="{{ url_for('signup') }}" class="btn btn-outline-secondary">Create account</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
