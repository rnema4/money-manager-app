{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card-soft bg-white p-4">
      <h3 class="mb-3">Password Reset</h3>
      <p class="text-muted small mb-4">Enter your email to generate a reset link.</p>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" required>
        </div>
        <div class="d-grid gap-2">
          <button class="btn btn-success">Generate reset link</button>
          <a href="{{ url_for('login') }}" class="btn btn-outline-secondary">Back to login</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
