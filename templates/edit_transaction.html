{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-9">
    <div class="card-soft bg-white p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">Edit Record</h3>
        <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('records') }}">Back to Records</a>
      </div>

      <form method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Date & Time</label>
            <input type="text" class="form-control tx-date-picker" name="tx_date" value="{{ transaction.tx_date.strftime('%Y-%m-%dT%H:%M') }}" required autocomplete="off">
          </div>

          <div class="col-md-6">
            <label class="form-label">Type</label>
            <select class="form-select" name="tx_type" id="tx_type" required>
              {% for item in ['expense', 'income', 'transfer'] %}
              <option value="{{ item }}" {% if transaction.tx_type == item %}selected{% endif %}>{{ item.title() }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Description</label>
            <input type="text" class="form-control" name="description" value="{{ transaction.description }}" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Amount</label>
            <input type="number" step="0.01" class="form-control" name="amount" value="{{ transaction.amount }}" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Account</label>
            <select class="form-select" name="account_id" required>
              {% for account in accounts %}
              <option value="{{ account.id }}" {% if transaction.account_id == account.id %}selected{% endif %}>{{ account.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Category</label>
            <select class="form-select" name="category_id" id="category_id" required>
              {% for category in categories %}
              <option value="{{ category.id }}" data-kind="{{ category.kind }}" {% if transaction.category_id == category.id %}selected{% endif %}>{{ category.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Payee</label>
            <input type="text" class="form-control" name="payee" value="{{ transaction.payee or '' }}">
          </div>

          <div class="col-md-6">
            <label class="form-label">Reference No</label>
            <input type="text" class="form-control" name="reference_no" value="{{ transaction.reference_no or '' }}">
          </div>

          <div class="col-12">
            <label class="form-label">Notes</label>
            <textarea class="form-control" name="notes" rows="3">{{ transaction.notes or '' }}</textarea>
          </div>
        </div>

        <div class="mt-4 d-flex gap-2">
          <button class="btn btn-success">Update Record</button>
          <a class="btn btn-outline-secondary" href="{{ url_for('records') }}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_green.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
(() => {
  flatpickr('.tx-date-picker', {
    enableTime: true,
    dateFormat: 'Y-m-d\\TH:i',
    altInput: true,
    altFormat: 'd M Y, h:i K',
    time_24hr: false,
    allowInput: false,
    disableMobile: true,
  });

  const txType = document.getElementById('tx_type');
  const category = document.getElementById('category_id');
  if (!txType || !category) return;

  function filterCategories() {
    const selectedType = txType.value;
    let firstVisibleValue = '';
    let currentStillVisible = false;

    Array.from(category.options).forEach((option) => {
      const show = option.dataset.kind === selectedType;
      option.hidden = !show;
      if (show && !firstVisibleValue) firstVisibleValue = option.value;
      if (show && option.selected) currentStillVisible = true;
    });

    if (!currentStillVisible && firstVisibleValue) {
      category.value = firstVisibleValue;
    }
  }

  txType.addEventListener('change', filterCategories);
  filterCategories();
})();
</script>
{% endblock %}
