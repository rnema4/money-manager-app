{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card-soft bg-white p-4">
      <h3 class="mb-2">Two-Factor Verification</h3>
      <p class="text-muted small mb-3">Enter the 6-digit code from your authenticator app{% if pending_user_name %} for <strong>{{ pending_user_name }}</strong>{% endif %}.</p>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">2FA Code</label>
          <input type="text" class="form-control" name="code" maxlength="6" pattern="[0-9]{6}" required>
        </div>
        <div class="d-grid gap-2">
          <button class="btn btn-success">Verify</button>
          <a href="{{ url_for('login') }}" class="btn btn-outline-secondary">Back to login</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
