<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline | Money Manager</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(circle at top left, #f2f7ff 0%, #eef7f2 45%, #f8fafc 100%);
      color: #0f172a;
    }
    .card {
      width: min(92vw, 420px);
      background: #fff;
      border-radius: 16px;
      padding: 1.25rem;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.2rem;
    }
    p {
      margin: 0;
      color: #475569;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>You're offline right now</h1>
    <p>Money Manager will reconnect automatically when internet is back.</p>
  </main>
</body>
</html>
